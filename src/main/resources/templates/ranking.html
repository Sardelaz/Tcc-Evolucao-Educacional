<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Ranking de Ligas | Evolução Educacional', '/css/style-ranking.css')}"></head>
<body>
    <canvas id="art-background"></canvas>
    <div th:replace="~{layout/base :: acessibilidade}"></div>

    <div class="top-nav-ranking">
        <div class="nav-content">
            <div class="nav-title-group">
                <span class="nav-icon" id="liga-icon-display">🏆</span>
                <h2 id="liga-title-display">Classificação da Liga</h2>
            </div>
            <a href="/" class="btn-voltar-home">← Voltar ao Início</a>
        </div>
    </div>

    <main class="ranking-wrapper">
        <section class="promotion-info-card">
            <div class="info-grid">
                <div class="info-main">
                    <div class="info-header">
                        <span class="info-badge">Temporada Semanal</span>
                        <h3 id="next-liga-name">Rumo à Próxima Liga</h3>
                    </div>
                    <p id="promotion-desc">Carregando requisitos...</p>
                </div>
                <div class="info-timer">
                    <span class="timer-label">A liga encerra em:</span>
                    <div id="cycle-end-date" class="timer-value">Calculando...</div>
                </div>
            </div>
            <div class="promotion-threshold-bar">
                <div class="bar-fill" id="promotion-progress"></div>
            </div>
        </section>

        <section class="podium-section">
            <div class="podium-container">
                <div class="podium-item silver" id="rank-2">
                    <div class="avatar-wrapper"><span class="rank-badge">2</span><div class="user-avatar">🥈</div></div>
                    <div class="user-info"><h3 class="user-name">-</h3><span class="user-xp">0 XP</span></div>
                    <div class="base"></div>
                </div>
                <div class="podium-item gold" id="rank-1">
                    <div class="crown">👑</div>
                    <div class="avatar-wrapper"><span class="rank-badge">1</span><div class="user-avatar">🥇</div></div>
                    <div class="user-info"><h3 class="user-name">-</h3><span class="user-xp">0 XP</span></div>
                    <div class="base"></div>
                </div>
                <div class="podium-item bronze" id="rank-3">
                    <div class="avatar-wrapper"><span class="rank-badge">3</span><div class="user-avatar">🥉</div></div>
                    <div class="user-info"><h3 class="user-name">-</h3><span class="user-xp">0 XP</span></div>
                    <div class="base"></div>
                </div>
            </div>
        </section>

        <section class="ranking-list-container">
            <div class="list-header"><span>Posição</span><span>Estudante</span><span>Experiência (XP Total)</span></div>
            <div id="ranking-items" class="ranking-scroll-area">
                <div class="loading-state">Sincronizando com a liga...</div>
            </div>
            <div class="pagination-controls">
                <button id="btn-prev-page" disabled>← Anterior</button>
                <span id="page-info">Página 1</span>
                <button id="btn-next-page" disabled>Próxima →</button>
            </div>
        </section>
    </main>

    <style>
        .promotion-info-card { background: rgba(15, 15, 25, 0.85); border: 1px solid var(--cor-borda); border-radius: 20px; padding: 25px; margin-bottom: 30px; backdrop-filter: blur(12px); }
        .info-grid { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .info-badge { background: #e67e22; color: #fff; padding: 5px 14px; border-radius: 25px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }
        .info-timer { text-align: right; background: rgba(255,255,255,0.04); padding: 12px; border-radius: 14px; }
        .timer-label { font-size: 0.7rem; color: #888; display: block; }
        .timer-value { color: #58cc02; font-weight: 700; font-size: 1.1rem; }
        .promotion-threshold-bar { height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; margin-top: 25px; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #58cc02, #2ecc71); transition: width 1.5s ease; }
        .pagination-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 35px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .pagination-controls button { background: #1e1e2e; border: 1px solid #3f3f5a; color: #fff; padding: 10px 24px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .pagination-controls button:hover:not(:disabled) { border-color: #58cc02; color: #58cc02; }
        .pagination-controls button:disabled { opacity: 0.3; cursor: not-allowed; }
        .pagination-controls span { font-weight: 700; color: #fff; }
        .tag-promo { background: rgba(88, 204, 2, 0.15); color: #58cc02; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; border: 1px solid #58cc02; margin-left: 10px; }
        .tag-releg { background: rgba(231, 76, 60, 0.15); color: #e74c3c; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; border: 1px solid #e74c3c; margin-left: 10px; }
    </style>

    <div th:replace="~{layout/base :: audio-player}"></div>
    <div th:replace="~{layout/base :: settings-modal}"></div>
    <div th:replace="~{layout/base :: scripts('/js/script-ranking.js')}"></div>
</body>
</html>
