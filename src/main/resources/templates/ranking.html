<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Ranking de Ligas | Evolução Educacional', '/css/style-ranking.css')}"></head>
<body>
    <canvas id="art-background"></canvas>
    <div th:replace="~{layout/base :: acessibilidade}"></div>

    <div class="top-nav-ranking">
        <div class="nav-content">
            <div class="nav-title-group">
                <span class="nav-icon" id="liga-icon-display">🏆</span>
                <h2 id="liga-title-display">Classificação da Liga</h2>
            </div>
            <a href="/" class="btn-voltar-home">
                <span class="arrow">←</span> Voltar ao Início
            </a>
        </div>
    </div>

    <main class="ranking-wrapper">
        
        <section class="promotion-info-card">
            <div class="info-grid">
                <div class="info-main">
                    <div class="info-header">
                        <span class="info-badge">Temporada Semanal</span>
                        <h3 id="next-liga-name">Rumo à Próxima Liga</h3>
                    </div>
                    <p id="promotion-desc">Carregando requisitos...</p>
                </div>
                <div class="info-timer">
                    <span class="timer-label">A liga encerra em:</span>
                    <div id="cycle-end-date" class="timer-value">--/--/----</div>
                </div>
            </div>
            <div class="promotion-threshold-bar">
                <div class="bar-fill" id="promotion-progress"></div>
            </div>
        </section>

        <section class="podium-section">
            <div class="podium-container">
                <div class="podium-item silver" id="rank-2">
                    <div class="avatar-wrapper">
                        <span class="rank-badge">2</span>
                        <div class="user-avatar">🥈</div>
                    </div>
                    <div class="user-info">
                        <h3 class="user-name">-</h3>
                        <span class="user-xp">0 XP</span>
                    </div>
                    <div class="base"></div>
                </div>

                <div class="podium-item gold" id="rank-1">
                    <div class="crown">👑</div>
                    <div class="avatar-wrapper">
                        <span class="rank-badge">1</span>
                        <div class="user-avatar">🥇</div>
                    </div>
                    <div class="user-info">
                        <h3 class="user-name">-</h3>
                        <span class="user-xp">0 XP</span>
                    </div>
                    <div class="base"></div>
                </div>

                <div class="podium-item bronze" id="rank-3">
                    <div class="avatar-wrapper">
                        <span class="rank-badge">3</span>
                        <div class="user-avatar">🥉</div>
                    </div>
                    <div class="user-info">
                        <h3 class="user-name">-</h3>
                        <span class="user-xp">0 XP</span>
                    </div>
                    <div class="base"></div>
                </div>
            </div>
        </section>

        <section class="ranking-list-container">
            <div class="list-header">
                <span>Posição</span>
                <span>Estudante</span>
                <span>Experiência (Ciclo)</span>
            </div>
            
            <div id="ranking-items" class="ranking-scroll-area">
                <div class="loading-state">Sincronizando com a liga...</div>
            </div>

            <div class="pagination-controls">
                <button id="btn-prev-page" disabled>← Anterior</button>
                <span id="page-info">Página 1</span>
                <button id="btn-next-page" disabled>Próxima →</button>
            </div>
        </section>
    </main>

    <style>
        .promotion-info-card {
            background: rgba(15, 15, 25, 0.85);
            border: 1px solid var(--cor-borda);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .info-grid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .info-badge {
            background: #e67e22;
            color: #fff;
            padding: 5px 14px;
            border-radius: 25px;
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .info-timer {
            text-align: right;
            background: rgba(255,255,255,0.04);
            padding: 12px 24px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .timer-label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .timer-value {
            font-family: 'Poppins', sans-serif;
            color: #58cc02;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .promotion-threshold-bar {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            margin-top: 25px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #58cc02, #2ecc71);
            transition: width 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            box-shadow: 0 0 15px rgba(88, 204, 2, 0.4);
        }

        /* Paginação Estilizada */
        .pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 35px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
        }
        .pagination-controls button {
            background: #1e1e2e;
            border: 1px solid #3f3f5a;
            color: #fff;
            padding: 10px 24px;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .pagination-controls button:hover:not(:disabled) {
            background: #2a2a3e;
            border-color: #58cc02;
            color: #58cc02;
            transform: translateY(-2px);
        }
        .pagination-controls button:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            transform: none;
        }
        .pagination-controls span {
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            min-width: 110px;
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 8px 15px;
            border-radius: 8px;
        }

        /* Tags de Promoção e Rebaixamento */
        .tag-promo {
            background: rgba(88, 204, 2, 0.15);
            color: #58cc02;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 800;
            margin-left: 12px;
            border: 1px solid rgba(88, 204, 2, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .tag-releg {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 800;
            margin-left: 12px;
            border: 1px solid rgba(231, 76, 60, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .ranking-item.promotion-zone { border-left: 5px solid #58cc02; }
        .ranking-item.relegation-zone { border-left: 5px solid #e74c3c; background: rgba(231, 76, 60, 0.03); }
    </style>

    <div th:replace="~{layout/base :: audio-player}"></div>
    <div th:replace="~{layout/base :: settings-modal}"></div>
    <div th:replace="~{layout/base :: scripts('/js/script-ranking.js')}"></div>
</body>
</html>
