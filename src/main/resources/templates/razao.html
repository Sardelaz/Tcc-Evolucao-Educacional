<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razão e Proporção | Evolução Educacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style-modulos.css}">
</head>

<body>
    <div class="page-container">
        <a href="/" class="back-button">← Voltar</a>
        <header>
            <h1>Razão, Proporção e Escala</h1>
        </header>
        <main>
            <div class="lessons-track" id="lessons-track"><svg id="track-lines"></svg></div>
        </main>
    </div>

    <audio id="bg-music" src="/audio/musica-fundo.mp3" loop preload="auto"></audio>
    <button id="music-toggle"
        style="position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: #1A1A2E; color: #EAEAEA; border: 2px solid rgba(255,255,255,0.2); border-radius: 50px; padding: 10px 20px; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s;">
        🎵 Música OFF
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const track = document.getElementById('lessons-track');
            const moduloAtual = 'razao';
            let lessonElements = [];

            try {
                // Buscamos dados do servidor e progresso do aluno
                const [respFases, respProgresso] = await Promise.all([
                    fetch(`/api/fases/${moduloAtual}`),
                    fetch('/api/progresso')
                ]);

                let minhasFases = await respFases.json();
                const statusData = await respProgresso.json();

                // Se o Java resetou e veio vazio, pegamos do localstorage
                if (minhasFases.length === 0) {
                    minhasFases = JSON.parse(localStorage.getItem(`fases_${moduloAtual}`) || "[]");

                    // Sincronizamos o servidor com o que temos guardado localmente
                    minhasFases.forEach(f => {
                        fetch(`/api/fases/${moduloAtual}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(f)
                        });
                    });
                }

                // Essa função cria visualmente as bolinhas (fases) na tela
                function generateLessons() {
                    // Limpa o caminho e prepara o SVG onde as linhas serão desenhadas
                    track.innerHTML = '<svg id="track-lines"></svg>';

                    // Se não tiver nenhuma fase criada, avisa o usuário
                    if (minhasFases.length === 0) {
                        track.innerHTML += '<p style="grid-column: 1/-1; text-align: center; color: #888; margin-top: 50px;">Nenhuma fase encontrada. Crie novas fases no painel Admin!</p>';
                        return;
                    }

                    // Para cada fase que a gente recebeu, vamos criar um "planeta" no mapa
                    minhasFases.forEach((faseObj, i) => {
                        const faseNum = faseObj.fase;
                        // Cálculo matemático para fazer o efeito de "zigue-zague" na trilha
                        const row = Math.floor(i / 4) + 1;
                        let col = (row % 2 !== 0) ? (i % 4) + 1 : 4 - (i % 4);

                        // Cria o container da fase e define a posição dele na grade (grid)
                        const item = document.createElement('div');
                        item.className = 'lesson-item';
                        item.dataset.lessonId = `mat-${faseNum}`;
                        item.style.gridRow = row; item.style.gridColumn = col;

                        // Cria o círculo clicável que leva para a aula
                        const link = document.createElement('a');
                        link.href = `/aula?modulo=${moduloAtual}&fase=${faseNum}`;
                        link.className = `lesson-circle planet-${(i % 4) + 1}`;
                        link.textContent = faseNum;

                        // Adiciona o título (Fase X) e o espacinho do status (Concluída ou não)
                        const title = document.createElement('p');
                        title.className = 'lesson-title';
                        title.textContent = `Fase ${faseNum}`;

                        const status = document.createElement('p');
                        status.className = 'lesson-status';

                        // Monta a estrutura e joga na tela
                        item.appendChild(link); item.appendChild(title); item.appendChild(status);
                        track.appendChild(item);
                        lessonElements.push(item); // Guarda o elemento numa lista para usar depois nas linhas
                    });
                }

                // Essa função desenha as linhas curvas que ligam um planeta no outro
                function drawTrackLines() {
                    const svg = document.getElementById('track-lines');
                    if (!svg) return;
                    svg.innerHTML = ''; // Limpa as linhas antigas (importante quando redimensiona a tela)

                    for (let i = 0; i < lessonElements.length - 1; i++) {
                        const startElem = lessonElements[i]; const endElem = lessonElements[i + 1];

                        // Pega as coordenadas X e Y do centro de cada círculo
                        const x1 = startElem.offsetLeft + startElem.offsetWidth / 2;
                        const y1 = startElem.offsetTop + startElem.querySelector('.lesson-circle').offsetHeight / 2;
                        const x2 = endElem.offsetLeft + endElem.offsetWidth / 2;
                        const y2 = endElem.offsetTop + endElem.querySelector('.lesson-circle').offsetHeight / 2;

                        // Cria um caminho (path) no SVG usando Curvas de Bézier para ficar bonitinho
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', `M${x1} ${y1} C ${x1} ${y1 + 80}, ${x2} ${y2 - 80}, ${x2} ${y2}`);
                        path.setAttribute('stroke', 'rgba(255,255,255,0.1)'); path.setAttribute('stroke-width', '3'); path.setAttribute('fill', 'none');
                        svg.appendChild(path);
                    }
                }

                // Essa função decide quais fases estão bloqueadas e quais estão feitas
                function checkAndUpdateUI() {
                    lessonElements.forEach((item, index) => {
                        const status = statusData[item.dataset.lessonId];

                        // A primeira fase sempre começa liberada
                        if (index === 0) item.classList.remove('locked');
                        else {
                            // Para liberar a próxima, a fase anterior tem que estar "completed"
                            const idAnterior = lessonElements[index - 1].dataset.lessonId;
                            if (statusData[idAnterior] === 'completed') item.classList.remove('locked');
                            else item.classList.add('locked');
                        }

                        // Se a fase já foi feita e não está bloqueada, bota o selo de "Concluída"
                        if (status && !item.classList.contains('locked')) {
                            item.classList.add(status);
                            if (status === 'completed') item.querySelector('.lesson-status').textContent = 'Concluída';
                        }
                    });
                }

                // Inicia tudo na ordem certa
                generateLessons();
                checkAndUpdateUI();
                // O timeout serve para esperar os elementos aparecerem no DOM antes de desenhar as linhas
                setTimeout(drawTrackLines, 100);
                // Se o usuário aumentar ou diminuir a janela, redesenha as linhas
                window.addEventListener('resize', drawTrackLines);
            } catch (error) {
                console.error("Erro ao carregar a trilha:", error);
            }
        });


    </script>

    <script th:src="@{/js/audio-controller.js}"></script>


</body>

</html>
