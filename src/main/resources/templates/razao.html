<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razão e Proporção | Evolução Educacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --cor-fundo: #0A0A10; --cor-texto: #EAEAEA; --cor-sutil: #888; --cor-borda-padrao: rgba(255, 255, 255, 0.15); --cor-matematica: #4CAF50; --cor-visitado: #27ae60; --cor-concluido: #5856D6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--cor-fundo); color: var(--cor-texto); overflow-x: hidden; }
        .page-container { width: 100%; max-width: 900px; margin: 0 auto; padding: 30px; position: relative; z-index: 1; }
        .back-button { position: fixed; top: 30px; left: 30px; z-index: 100; display: inline-flex; align-items: center; gap: 8px; background: #FFF; color: #000; padding: 10px 15px; border-radius: 50px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; }
        header h1 { font-size: 2.8rem; font-weight: 700; margin-bottom: 60px; text-align: center; color: var(--cor-matematica); }
        .lessons-track { position: relative; width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 180px; align-items: center; justify-items: center; }
        #track-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .lesson-item { display: flex; flex-direction: column; align-items: center; text-align: center; z-index: 1; position: relative; }
        .lesson-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid var(--cor-borda-padrao); font-size: 1.5rem; font-weight: 600; text-decoration: none; color: var(--cor-texto); transition: all 0.3s ease; margin-bottom: 10px; }
        .lesson-circle:hover { transform: scale(1.15); }
        .planet-1 { background: radial-gradient(circle at 20% 20%, #ff8a00, #e52e71); }
        .planet-2 { background: radial-gradient(circle at 70% 70%, #00c6ff, #0072ff); }
        .planet-3 { background: radial-gradient(circle at 30% 70%, #fdfcfb, #e2d1c3); }
        .planet-4 { background: radial-gradient(circle at 80% 30%, #a770ef, #cf8bf3, #fdb99b); }
        .lesson-title { font-size: 0.8rem; font-weight: 500; color: var(--cor-sutil); }
        .lesson-status { font-size: 0.75rem; font-weight: 500; height: 20px; margin-top: 4px; }
        .lesson-item.locked { opacity: 0.4; filter: grayscale(80%); }
        .lesson-item.locked .lesson-circle { cursor: not-allowed; background: #333; pointer-events: none; }
        .lesson-item.completed .lesson-circle { border: 4px solid var(--cor-concluido); opacity: 0.7; }
        .lesson-item.completed .lesson-title, .lesson-item.completed .lesson-status { color: var(--cor-concluido); }
    </style>
</head>
<body>
    <div class="page-container">
        <a href="/" class="back-button">← Voltar</a>
        <header><h1>Razão, Proporção e Escala</h1></header>
        <main><div class="lessons-track" id="lessons-track"><svg id="track-lines"></svg></div></main>
    </div>

    <audio id="bg-music" src="/audio/musica-fundo.mp3" loop preload="auto"></audio>
    <button id="music-toggle" style="position: fixed; bottom: 20px; left: 20px; z-index: 9999; background: #1A1A2E; color: #EAEAEA; border: 2px solid rgba(255,255,255,0.2); border-radius: 50px; padding: 10px 20px; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s;">
        🎵 Música OFF
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const track = document.getElementById('lessons-track');
            const moduloAtual = 'razao'; 
            const lessonElements = [];

            try {
                const [respFases, respProgresso] = await Promise.all([
                    fetch(`/api/fases/${moduloAtual}`),
                    fetch('/api/progresso')
                ]);
                
                const minhasFases = await respFases.json();
                const statusData = await respProgresso.json();

                function generateLessons() {
                    track.innerHTML = '<svg id="track-lines"></svg>'; 
                    
                    if(minhasFases.length === 0) {
                        track.innerHTML += '<p style="grid-column: 1/-1; text-align: center; color: #888; margin-top: 50px;">Nenhuma fase criada no servidor.</p>';
                        return;
                    }

                    for (let i = 0; i < minhasFases.length; i++) {
                        const faseNum = minhasFases[i].fase;
                        const row = Math.floor(i / 4) + 1;
                        let col = (row % 2 !== 0) ? (i % 4) + 1 : 4 - (i % 4);

                        const item = document.createElement('div');
                        item.className = 'lesson-item';
                        item.dataset.lessonId = `mat-${faseNum}`;
                        item.style.gridRow = row; item.style.gridColumn = col;

                        const link = document.createElement('a');
                        link.href = `/aula?modulo=${moduloAtual}&fase=${faseNum}`; 
                        link.className = `lesson-circle planet-${(i % 4) + 1}`;
                        link.textContent = faseNum;

                        const title = document.createElement('p');
                        title.className = 'lesson-title';
                        title.textContent = `Fase ${faseNum}`;

                        const status = document.createElement('p');
                        status.className = 'lesson-status';

                        item.appendChild(link); item.appendChild(title); item.appendChild(status);
                        track.appendChild(item);
                        lessonElements.push(item);
                    }
                }

                function drawTrackLines() {
                    const svg = document.getElementById('track-lines');
                    if(!svg) return;
                    svg.innerHTML = '';
                    for (let i = 0; i < lessonElements.length - 1; i++) {
                        const startElem = lessonElements[i]; const endElem = lessonElements[i + 1];
                        const x1 = startElem.offsetLeft + startElem.offsetWidth / 2;
                        const y1 = startElem.offsetTop + startElem.querySelector('.lesson-circle').offsetHeight / 2;
                        const x2 = endElem.offsetLeft + endElem.offsetWidth / 2;
                        const y2 = endElem.offsetTop + endElem.querySelector('.lesson-circle').offsetHeight / 2;
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', `M${x1} ${y1} C ${x1} ${y1 + 80}, ${x2} ${y2 - 80}, ${x2} ${y2}`);
                        path.setAttribute('stroke', 'rgba(255,255,255,0.1)'); path.setAttribute('stroke-width', '3'); path.setAttribute('fill', 'none');
                        svg.appendChild(path);
                    }
                }

                function checkAndUpdateUI() {
                    lessonElements.forEach((item, index) => {
                        const status = statusData[item.dataset.lessonId];
                        if (index === 0) item.classList.remove('locked');
                        else {
                            const idAnterior = lessonElements[index - 1].dataset.lessonId;
                            if (statusData[idAnterior] === 'completed') item.classList.remove('locked');
                            else item.classList.add('locked');
                        }
                        if (status && !item.classList.contains('locked')) {
                            item.classList.add(status);
                            if(status === 'completed') item.querySelector('.lesson-status').textContent = 'Concluída';
                        }
                    });
                }

                generateLessons(); 
                checkAndUpdateUI();
                setTimeout(drawTrackLines, 100); 
                window.addEventListener('resize', drawTrackLines);
            } catch (error) {
                console.error("Erro ao comunicar com o servidor", error);
            }
        });

        // Lógica da Música Global
        const bgMusic = document.getElementById('bg-music');
        const musicToggle = document.getElementById('music-toggle');
        bgMusic.volume = 0.3;

        if (sessionStorage.getItem('musicPlaying') === 'true') {
            const savedTime = parseFloat(sessionStorage.getItem('musicTime') || 0);
            bgMusic.currentTime = savedTime;
            bgMusic.play().then(() => {
                musicToggle.innerHTML = '🔊 Música ON';
            }).catch(e => {
                sessionStorage.setItem('musicPlaying', 'false');
            });
        }

        bgMusic.addEventListener('timeupdate', () => {
            if (!bgMusic.paused) sessionStorage.setItem('musicTime', bgMusic.currentTime);
        });

        musicToggle.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                sessionStorage.setItem('musicPlaying', 'true');
                musicToggle.innerHTML = '🔊 Música ON';
            } else {
                bgMusic.pause();
                sessionStorage.setItem('musicPlaying', 'false');
                musicToggle.innerHTML = '🎵 Música OFF';
            }
        });
    </script>
</body>
</html>
