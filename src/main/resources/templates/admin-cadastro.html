<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Docente | Evolução Educacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #050508;
            --bg-surface: rgba(18, 18, 24, 0.8);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --accent-main: #3b82f6;
            --accent-secure: #d97706; /* Laranja de segurança */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #050508 100%);
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 40px;
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; }
        .header p { color: var(--text-secondary); font-size: 0.9rem; }
        .header span { color: var(--accent-main); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-field:focus { border-color: var(--accent-main); }
        
        .input-secure { border-left: 3px solid var(--accent-secure); }
        .input-secure:focus { border-color: var(--accent-secure); }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent-main);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { background: #2563eb; transform: translateY(-2px); }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            text-align: center;
        }
        .alert-danger { background: rgba(239, 68, 68, 0.1); color: var(--error-color); border: 1px solid var(--error-color); }
        .alert-success { background: rgba(16, 185, 129, 0.1); color: var(--success-color); border: 1px solid var(--success-color); }

        .footer-links { text-align: center; margin-top: 25px; font-size: 0.85rem; color: var(--text-secondary); }
        .footer-links a { color: var(--accent-main); text-decoration: none; font-weight: 500; }
        
        .security-note {
            font-size: 0.75rem;
            color: var(--accent-secure);
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="header">
            <h1>Docente <span>Evolução</span></h1>
            <p>Acesso restrito à equipa de gestão educacional.</p>
        </div>

        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

        <form th:action="@{/admin/cadastro}" method="post">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" name="nome" class="input-field" placeholder="Ex: Prof. João Silva" required>
            </div>

            <div class="form-group">
                <label>E-mail Institucional</label>
                <input type="email" name="email" class="input-field" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label>Palavra-passe</label>
                <input type="password" name="senha" class="input-field" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>Código Institucional (Token de Segurança)</label>
                <input type="password" name="tokenSeguranca" class="input-field input-secure" placeholder="Insira o código fornecido pela coordenação" required>
                <span class="security-note">Obrigatório para criação de contas administrativas.</span>
            </div>

            <button type="submit" class="btn-submit">Validar e Finalizar Cadastro</button>
        </form>

        <div class="footer-links">
            Já possui conta? <a th:href="@{/login}">Fazer Login</a><br><br>
            <a th:href="@{/landing}">Voltar para a Apresentação</a>
        </div>
    </div>

</body>
</html>
