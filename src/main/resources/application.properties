spring.application.name=tcc
server.port=${PORT:8080}

# ==========================================================
# CONFIGURAÇÕES DE CONEXÃO (POSTGRESQL - AIVEN)
# ==========================================================
# Certifique-se que no painel do Render a variável SPRING_DATASOURCE_URL 
# NÃO tenha aspas duplas ("").
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate para PostgreSQL (Corrigido)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================================
# CONFIGURAÇÕES DE E-MAIL (GMAIL SMTP)
# ==========================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

# Propriedades de segurança para atravessar firewalls de nuvem
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Timeouts aumentados para 60 segundos para evitar Connect timed out
spring.mail.properties.mail.smtp.connectiontimeout=60000
spring.mail.properties.mail.smtp.timeout=60000
spring.mail.properties.mail.smtp.writetimeout=60000

# Forçar o uso de IPv4 (Essencial para o Render/Gmail)
spring.mail.properties.mail.smtp.localaddress=0.0.0.0