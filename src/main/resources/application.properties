spring.application.name=tcc
server.port=${PORT:10000}

# ==========================================================
# CONFIGURAÇÕES DE CONEXÃO (POSTGRESQL - AIVEN)
# ==========================================================
# Certifique-se de que no Render a variável SPRING_DATASOURCE_URL não tem aspas ""
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate para PostgreSQL (Corrigido)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================================
# CONFIGURAÇÕES DE E-MAIL (GMAIL SMTP - MODO SEGURO 465)
# ==========================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

# Propriedades de Autenticação e Protocolo SSL
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Timeouts de 60 segundos para evitar o erro de Connect timed out
spring.mail.properties.mail.smtp.connectiontimeout=60000
spring.mail.properties.mail.smtp.timeout=60000
spring.mail.properties.mail.smtp.writetimeout=60000

# Forçar a aplicação a usar IPv4 (Essencial para o Render)
spring.mail.properties.mail.smtp.localaddress=0.0.0.0