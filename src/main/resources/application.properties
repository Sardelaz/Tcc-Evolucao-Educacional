spring.application.name=tcc
server.port=${PORT:8080}

# ==========================================================
# CONFIGURAÇÕES DE CONEXÃO (POSTGRESQL - AIVEN)
# ==========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================================
# CONFIGURAÇÕES DE E-MAIL (BREVO SMTP - PORTA 2525)
# ==========================================================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=${SPRING_MAIL_PORT:2525}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

# Configurações obrigatórias para autenticação no Brevo
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# IMPORTANTE: Desativa o SSL direto para evitar conflito na porta 2525
spring.mail.properties.mail.smtp.ssl.enable=false

# Timeouts para evitar travamentos no Render
spring.mail.properties.mail.smtp.connectiontimeout=60000
spring.mail.properties.mail.smtp.timeout=60000
spring.mail.properties.mail.smtp.writetimeout=60000

# Forçar IPv4 e permitir qualquer host confiável
spring.mail.properties.mail.smtp.localaddress=0.0.0.0
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com