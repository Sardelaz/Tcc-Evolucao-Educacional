<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Cadastrar Vídeo | Evolução Educacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style-admin.css}">
    <style>
        #art-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    </style>
</head>

<body>
    <canvas id="art-background"></canvas>
    <div th:replace="~{layout/base :: acessibilidade}"></div>

    <div class="admin-container" style="max-width: 600px;">
        <h1 style="color: #1cb0f6;">Cadastrar Videoaula Avulsa</h1>
        <p style="text-align: center; color: #aaa; margin-bottom: 30px;">Este vídeo aparecerá na Galeria Principal para todos os alunos.</p>

        <form id="form-admin-video">
            <div class="form-group">
                <label for="titulo">Título da Videoaula</label>
                <input type="text" id="titulo" required placeholder="Ex: Revisão de Frações">
            </div>

            <div class="form-group">
                <label for="modulo">Módulo (Matéria)</label>
                <select id="modulo" required>
                    <option value="razao">Razão, Proporção e Escala</option>
                    <option value="estatistica">Estatística</option>
                    <option value="probabilidade">Probabilidade</option>
                    <option value="aritmetica">Aritmética</option>
                    <option value="geral">Geral / Dicas de Estudo</option>
                </select>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label for="url" style="color: #1cb0f6;">URL do Vídeo (YouTube)</label>
                <input type="url" id="url" required placeholder="Ex: https://www.youtube.com/watch?v=...">
            </div>

            <button type="submit" id="btn-submit" style="background-color: #1cb0f6; margin-top: 30px;">Salvar Videoaula</button>
        </form>

        <a href="/painel-geral" class="back-link">← Voltar para o Painel Geral</a>
    </div>

    <div th:replace="~{layout/base :: audio-player}"></div>
    <div th:replace="~{layout/base :: settings-modal}"></div>
    <script th:src="@{/js/core.js}"></script>
    <script th:src="@{/js/particles-bg.js}"></script>
    <script th:src="@{/js/script-admin-video.js}"></script>
</body>
</html>
